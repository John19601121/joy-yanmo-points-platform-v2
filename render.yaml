services:
  - type: web
    name: joy-yanmo-points
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: "node scripts/init-db.js && node server.js"
    healthCheckPath: /healthz
    disk:
      name: joy-yanmo-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_PATH
        value: /var/data/app.sqlite
      - key: COOKIE_SECURE
        value: "true"
      - key: SESSION_SECRET
        sync: false
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: INITIAL_ADMIN_NAME
        value: 總部管理員
